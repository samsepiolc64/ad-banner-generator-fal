<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!--
      Gradient: blue → bright-cyan (flash point) → red → dark → back to blue
      The flash point (near-white cyan) rotating around creates the "migająca" effect.
    -->
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1D4ED8"/>
      <stop offset="22%"  stop-color="#3B82F6"/>
      <stop offset="42%"  stop-color="#BAE6FD" stop-opacity="0.95"/>
      <stop offset="58%"  stop-color="#EF4444"/>
      <stop offset="80%"  stop-color="#991B1B"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <clipPath id="c">
      <circle cx="16" cy="16" r="15.5"/>
    </clipPath>
  </defs>

  <!-- Rotating oversized rect with gradient, clipped to circle — creates fluid swirl -->
  <g clip-path="url(#c)">
    <rect x="-8" y="-8" width="48" height="48" fill="url(#g)">
      <animateTransform attributeName="transform" type="rotate"
        from="0 16 16" to="360 16 16"
        dur="1.8s" repeatCount="indefinite"/>
    </rect>

    <!-- Top-left glossy highlight — liquid depth -->
    <ellipse cx="11" cy="8.5" rx="8.5" ry="5.5" fill="white" opacity="0.18"/>

    <!-- Bottom-right shadow for sphere roundness -->
    <ellipse cx="22" cy="23" rx="7" ry="5" fill="black" opacity="0.18"/>
  </g>

  <!-- Outer rim — thin border for crispness -->
  <circle cx="16" cy="16" r="15.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
</svg>
