[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888

[functions]
  external_node_modules = ["*"]

[functions."generate-image"]
  timeout = 90

[functions."check-result"]
  timeout = 15

[functions."research-domain"]
  timeout = 60

[functions."generate-copy"]
  timeout = 30

[functions."remove-bg"]
  timeout = 30

[functions."fetch-url-content"]
  timeout = 25

[functions."add-cost"]
  timeout = 10

[functions."update-client-meta"]
  timeout = 10

[functions."list-clients"]
  timeout = 10

[functions."upload-to-drive"]
  timeout = 30

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
