[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888

[functions]
  external_node_modules = ["*"]

[functions."generate-image"]
  timeout = 60

[functions."research-domain"]
  timeout = 30

[functions."generate-copy"]
  timeout = 30

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
